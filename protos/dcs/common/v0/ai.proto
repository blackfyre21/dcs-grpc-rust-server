syntax = "proto3";
package dcs.common.v0;
import "google/protobuf/struct.proto";
import "dcs/common/v0/common.proto";
option csharp_namespace = "RurouniJones.Dcs.Grpc.V0.Common";
option go_package = "github.com/DCS-gRPC/go-bindings/dcs/v0/common";
option java_package = "ru.blackfyre.dcs.warcore.proto";

/**
 * AI options identifiers
 * all options have +1 value increment to conform protobuf
 */
enum AiOptionAirId {
    AI_OPTION_AIR_ID_UNSPECIFIED = 0;
    AI_OPTION_AIR_ID_ROE = 1;
    AI_OPTION_AIR_ID_REACTION_ON_THREAT = 2;
    AI_OPTION_AIR_ID_RADAR_USING = 4;
    AI_OPTION_AIR_ID_FLARE_USING = 5;
    AI_OPTION_AIR_ID_FORMATION = 6;
    AI_OPTION_AIR_ID_RTB_ON_BINGO = 7;
    AI_OPTION_AIR_ID_SILENCE = 8;
    AI_OPTION_AIR_ID_RTB_ON_OUT_OF_AMMO = 11;
    AI_OPTION_AIR_ID_ECM_USING = 14;
    AI_OPTION_AIR_ID_PROHIBIT_AA = 15;
    AI_OPTION_AIR_ID_PROHIBIT_JETT = 16;
    AI_OPTION_AIR_ID_PROHIBIT_AB = 17;
    AI_OPTION_AIR_ID_PROHIBIT_AG = 18;
    AI_OPTION_AIR_ID_MISSILE_ATTACK = 19;
    AI_OPTION_AIR_ID_PROHIBIT_WP_PASS_REPORT = 20;
    AI_OPTION_AIR_ID_OPTION_RADIO_USAGE_CONTACT = 22;
    AI_OPTION_AIR_ID_OPTION_RADIO_USAGE_ENGAGE = 23;
    AI_OPTION_AIR_ID_OPTION_RADIO_USAGE_KILL = 24;
    AI_OPTION_AIR_ID_JETT_TANKS_IF_EMPTY = 26;
    AI_OPTION_AIR_ID_FORCED_ATTACK = 27;
    AI_OPTION_AIR_ID_PREFER_VERTICAL = 33;
    AI_OPTION_AIR_ID_ALLOW_FORMATION_SIDE_SWAP = 36;
    AI_OPTION_AIR_ID_LANDING_OPTIONS = 37;
}
enum Skill {
  SKILL_UNSPECIFIED = 0;
  SKILL_AVERAGE = 1;
  SKILL_GOOD = 2;
  SKILL_HIGH = 3;
  SKILL_EXCELLENT = 4;
  SKILL_PLAYER = 5;
}
enum AltitudeType {
  ALTITUDE_TYPE_UNSPECIFIED = 0;
  ALTITUDE_TYPE_BAROMETRIC = 1;
  ALTITUDE_TYPE_RADIO = 2;
}

enum WaypointType {
  WAYPOINT_TYPE_UNSPECIFIED = 0;
  WAYPOINT_TYPE_TAKEOFF = 1;
  WAYPOINT_TYPE_TAKEOFF_PARKING = 2;
  WAYPOINT_TYPE_TURNING_POINT = 3;
  WAYPOINT_TYPE_TAKEOFF_PARKING_HOT = 4;
  WAYPOINT_TYPE_LAND = 5;
  WAYPOINT_TYPE_TAKEOFF_GROUND = 6;
  WAYPOINT_TYPE_TAKEOFF_GROUND_HOT  = 7;
}

enum WaypointAction {
  WAYPOINT_ACTION_UNSPECIFIED = 0;
  WAYPOINT_ACTION_OFF_ROAD = 1;
  WAYPOINT_ACTION_ON_ROAD = 2;
  WAYPOINT_ACTION_TURNING_POINT = 3;
  WAYPOINT_ACTION_LANDING = 4;
}

message AiTask {
  string id = 1;
  bool auto = 2;
  bool enabled = 3;
  uint32 number = 4;
  google.protobuf.Struct params = 5;
}

message AiComboTask {
  message AiComboTaskParams {
    repeated AiTask tasks = 1;
  }

  string id = 1;
  AiComboTaskParams params = 2;
}

message Waypoint {
  dcs.common.v0.InputCoordinates position = 1;
  AltitudeType alt_type = 2;
  WaypointType type = 3;
  double speed = 4;
  bool speed_locked = 5;
  uint32 eta = 6;
  bool eta_locked = 7;
  WaypointAction action = 8; 
  optional string formation_template = 9;
  AiComboTask task = 10;
}

message Route {
  repeated Waypoint points = 1;
}

message SpawnUnitData {
  string name = 1;
  string type = 2;
  int32 unit_id = 3;
  Skill skill = 4;
  //Unit haeading in radians
  double heading = 5;
  optional string livery_id = 6;
  dcs.common.v0.InputCoordinates position = 7;
}

message SpawnVehicleData {
  SpawnUnitData common = 1;
  //if taccom can drive unit, true by default
  bool player_can_drive = 2;
  bool cold_at_start = 3;
}

message Callsign {
  string name = 1;
  int32 db_callnames_index = 2;
  int32 group_index = 3;
  int32 unit_index = 4;
}

message Payload {
  //fuel amount in kilogramms
  int32 fuel = 1;
  int32 flare = 2;
  int32 chaff = 3;
  int32 ammo_type = 4;
  int32 gun = 5;
  repeated Pylon pylons = 6;
  message Pylon {
    string clsid = 1;
    google.protobuf.Struct settings = 2;
  }
}

message SpawnAircraftData {
  SpawnUnitData common = 1;
  optional int32 parking = 2;
  optional int32 parking_id = 3;
  int32 onboard_num = 5;
  AltitudeType alt_type = 6;
  double alt = 12;
  optional bool hadrpoint_racks = 7;
  //Negative heading
  double psi = 8;
  Payload payload = 9;
  //Either Russian style numbers (137) or NATO-style Enfield11
  oneof callsign {
    Callsign western = 10;
    string eastern = 11;
  }
  google.protobuf.Struct additional_properties = 13;
}

message SpawnGroupData {
  int32 group_id = 1;
  string name = 2;
  optional int32 start_time = 3;
  bool hidden = 4; 
  optional bool hidden_on_mfd = 5;
  optional bool hidden_on_planner = 6;
  //meaning is unknown by default true
  bool task_selected = 7;
  //Can be controlled only by a Game Master
  bool uncontrollable = 8;
  optional bool late_activation = 9;
  //This is enum
  string task = 10;
  Route route = 11;
  dcs.common.v0.InputCoordinates position = 12;
}

message SpawnVehicleGroupData {
  SpawnGroupData common = 1;
  optional bool visible = 2;
  optional bool manual_heading = 3;
  optional int32 probability = 4;
  optional google.protobuf.Struct tasks = 5;
  repeated SpawnVehicleData units = 6;
}

message SpawnAircraftGroupData {
  SpawnGroupData common = 1;
  optional bool uncontrolled = 2;
  optional bool communication = 3;
  dcs.common.v0.RadioModulation modulation = 4;
  double frequency = 5;
  optional bool radioSet = 6;
  repeated SpawnAircraftData units = 7;
}

